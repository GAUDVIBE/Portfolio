services:
  - type: web
    name: portfolio
    env: static
    staticPublishPath: .
    buildCommand: ""
    # NB: ce service n'est pas pilote par render.yaml (Render ignore buildCommand
    # et ces headers ; le cache est gere en amont par Cloudflare). Le
    # cache-busting est fait par .github/workflows/cache-bust.yml qui tamponne
    # ?v=<sha> dans index.html a chaque push.
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /*.js
        name: Cache-Control
        value: public, max-age=31536000
      - path: /*.pdf
        name: Cache-Control
        value: public, max-age=31536000
