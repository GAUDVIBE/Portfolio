services:
  - type: web
    name: portfolio
    env: static
    staticPublishPath: .
    # Cache-busting automatique : tamponne ?v=<sha court> sur les <script> de
    # index.html a chaque deploy. RENDER_GIT_COMMIT change a chaque commit, donc
    # toute edition de shader.js / buttons.js casse le cache sans bump manuel.
    buildCommand: 'sed -i "s/?v=[A-Za-z0-9]*/?v=$(echo ${RENDER_GIT_COMMIT:-dev} | cut -c1-8)/g" index.html'
    headers:
      # index.html jamais mis en cache dur => le nouveau ?v= est toujours vu
      # (revalidation legere, 304 si inchange).
      - path: /
        name: Cache-Control
        value: no-cache
      - path: /index.html
        name: Cache-Control
        value: no-cache
      # JS versionnes par le sha du commit => cache long immutable.
      - path: /*.js
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.pdf
        name: Cache-Control
        value: public, max-age=31536000
      # Previews / images.
      - path: /*.png
        name: Cache-Control
        value: public, max-age=3600
