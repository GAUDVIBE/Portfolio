services:
  - type: web
    name: portfolio
    env: static
    staticPublishPath: .
    # Cache-busting automatique : tamponne ?v=<timestamp du build> sur les
    # <script> de index.html a chaque deploy. date +%s est toujours dispo (pas
    # de dependance a une variable Render), donc toute edition de
    # shader.js / buttons.js casse le cache sans bump manuel.
    buildCommand: 'sed -i "s/?v=[A-Za-z0-9]*/?v=$(date +%s)/g" index.html'
    headers:
      # index.html jamais mis en cache dur => le nouveau ?v= est toujours vu
      # (revalidation legere, 304 si inchange).
      - path: /
        name: Cache-Control
        value: no-cache
      - path: /index.html
        name: Cache-Control
        value: no-cache
      # JS versionnes par le sha du commit => cache long immutable.
      - path: /*.js
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*.pdf
        name: Cache-Control
        value: public, max-age=31536000
      # Previews / images.
      - path: /*.png
        name: Cache-Control
        value: public, max-age=3600
