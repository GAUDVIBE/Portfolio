name: Render CV to PNG

on:
  push:
    branches: [main]
    paths:
      - 'CV.pdf'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyMuPDF
        run: pip install --quiet "pymupdf~=1.27"

      - name: Render CV.pdf page 1 to PNG (200 DPI)
        run: |
          python <<'EOF'
          import fitz, os
          doc = fitz.open("CV.pdf")
          mat = fitz.Matrix(200/72, 200/72)
          pix = doc[0].get_pixmap(matrix=mat, alpha=False)
          pix.save("screenshots/cv.png")
          kb = os.path.getsize("screenshots/cv.png") // 1024
          print(f"Rendered {pix.width}x{pix.height} ({kb} KB)")
          EOF

      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add screenshots/cv.png
          git diff --staged --quiet || git commit -m "Update CV screenshot [automated]"
          git pull --rebase origin main
          git push
